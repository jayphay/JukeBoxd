<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create review • Jukeboxd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .song-search-wrap { position: relative; }
      .song-results {
        position: absolute;
        top: 100%;
        left: 0; right: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-top: 4px;
        max-height: 220px;
        overflow-y: auto;
        z-index: 100;
        display: none;
        box-shadow: var(--shadow);
      }
      .song-results.open { display: block; }
      .song-result-item {
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px;
        border-bottom: 1px solid var(--border);
      }
      .song-result-item:last-child { border-bottom: none; }
      .song-result-item:hover { background: rgba(255,255,255,.06); }
      .song-result-item__artist { font-size: 12px; color: var(--muted2); margin-top: 2px; }
      .selected-song {
        display: none;
        padding: 10px 14px;
        background: rgba(255,211,138,.08);
        border: 1px solid rgba(255,211,138,.20);
        border-radius: 10px;
        font-size: 14px;
        margin-top: 6px;
        align-items: center;
        justify-content: space-between;
      }
      .selected-song.visible { display: flex; }
      .selected-song__clear {
        cursor: pointer;
        color: var(--muted2);
        font-size: 12px;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>

    <div th:replace="~{fragments/header :: main-header}"></div>

    <main class="wrap">
      <section class="grid grid--single">
        <section class="card card--wide">
          <div class="card__head">
            <h2>Create a review</h2>
            <span class="pill">New</span>
          </div>

          <!-- Success message -->
          <div th:if="${successMessage}" style="
            background: rgba(100,255,150,.10);
            border: 1px solid rgba(100,255,150,.25);
            color: rgba(150,255,180,.95);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 18px;">
            <span th:text="${successMessage}"></span>
          </div>

          <!-- Error message -->
          <div th:if="${errorMessage}" style="
            background: rgba(255,100,100,.10);
            border: 1px solid rgba(255,100,100,.25);
            color: rgba(255,160,160,.95);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 18px;">
            <span th:text="${errorMessage}"></span>
          </div>

          <form class="form" method="post" action="/create-review" id="review-form">

            <!-- Hidden field that actually gets submitted -->
            <input type="hidden" name="songId" id="selected-song-id" required />

            <label class="field">
              <span class="field__label">Song</span>
              <div class="song-search-wrap">
                <input
                  class="field__input"
                  type="text"
                  id="song-search-input"
                  placeholder="Search for a song..."
                  autocomplete="off"
                />
                <div class="song-results" id="song-results"></div>
              </div>
              <!-- Shows the selected song with an option to clear it -->
              <div class="selected-song" id="selected-song-display">
                <span id="selected-song-label"></span>
                <span class="selected-song__clear" id="clear-song">Change</span>
              </div>
            </label>

            <label class="field">
              <span class="field__label">Rating</span>
              <select class="field__input" name="rating" required>
                <option value="5">★★★★★</option>
                <option value="4" selected>★★★★☆</option>
                <option value="3">★★★☆☆</option>
                <option value="2">★★☆☆☆</option>
                <option value="1">★☆☆☆☆</option>
              </select>
            </label>

            <label class="field">
              <span class="field__label">Review</span>
              <textarea
                class="field__input field__textarea"
                name="comment"
                rows="5"
                placeholder="What did you think?"
                required
              ></textarea>
            </label>

            <div class="actions">
              <button class="btn btn--primary" type="submit">Publish review</button>
              <a class="btn btn--ghost" href="/">Cancel</a>
            </div>
          </form>

        </section>
      </section>
    </main>

    <script th:inline="javascript">
      // All songs injected from the server
      const ALL_SONGS = /*[[${songs}]]*/ [];
    </script>
    <script>
      const searchInput   = document.getElementById('song-search-input');
      const resultsBox    = document.getElementById('song-results');
      const hiddenId      = document.getElementById('selected-song-id');
      const display       = document.getElementById('selected-song-display');
      const displayLabel  = document.getElementById('selected-song-label');
      const clearBtn      = document.getElementById('clear-song');

      const selectSong = (song) => {
        hiddenId.value       = song.songId;
        displayLabel.textContent = `${song.title} — ${song.artistName}`;
        display.classList.add('visible');
        searchInput.style.display = 'none';
        resultsBox.classList.remove('open');
      };

      const clearSong = () => {
        hiddenId.value = '';
        display.classList.remove('visible');
        searchInput.style.display = '';
        searchInput.value = '';
        searchInput.focus();
      };

      clearBtn.addEventListener('click', clearSong);

      searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim().toLowerCase();
        if (!q) { resultsBox.classList.remove('open'); return; }

        const matches = ALL_SONGS.filter(s =>
          s.title.toLowerCase().includes(q) ||
          s.artistName.toLowerCase().includes(q)
        ).slice(0, 10);

        if (!matches.length) {
          resultsBox.innerHTML = '<div class="song-result-item">No songs found</div>';
        } else {
          resultsBox.innerHTML = matches.map(s => `
            <div class="song-result-item" data-id="${s.songId}" data-title="${s.title}" data-artist="${s.artistName}">
              ${s.title}
              <div class="song-result-item__artist">${s.artistName}</div>
            </div>`).join('');
        }
        resultsBox.classList.add('open');
      });

      resultsBox.addEventListener('click', (e) => {
        const item = e.target.closest('.song-result-item');
        if (!item || !item.dataset.id) return;
        selectSong({ songId: item.dataset.id, title: item.dataset.title, artistName: item.dataset.artist });
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.song-search-wrap')) {
          resultsBox.classList.remove('open');
        }
      });

      // Prevent submitting without a song selected
      document.getElementById('review-form').addEventListener('submit', (e) => {
        if (!hiddenId.value) {
          e.preventDefault();
          searchInput.style.border = '1px solid rgba(255,100,100,.6)';
          searchInput.placeholder = 'Please select a song first';
        }
      });
    </script>
  </body>
</html>
