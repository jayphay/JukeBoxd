<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create review • Jukeboxd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg"></div>

    <div th:replace="~{fragments/header :: main-header}"></div>

    <main class="wrap">
      <section class="grid grid--single">
        <section class="card card--wide">
          <div class="card__head">
            <h2>Create a review</h2>
            <span class="pill">New</span>
          </div>

          <!-- Success message -->
          <div th:if="${successMessage}" style="
            background: rgba(100,255,150,.10);
            border: 1px solid rgba(100,255,150,.25);
            color: rgba(150,255,180,.95);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 18px;">
            <span th:text="${successMessage}"></span>
          </div>

          <!-- Error message -->
          <div th:if="${errorMessage}" style="
            background: rgba(255,100,100,.10);
            border: 1px solid rgba(255,100,100,.25);
            color: rgba(255,160,160,.95);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 18px;">
            <span th:text="${errorMessage}"></span>
          </div>

          <form class="form" method="post" action="/create-review">
            <label class="field">
              <span class="field__label">Song</span>
              <select class="field__input" name="songId" required>
                <option value="">— Select a song —</option>
                <option th:each="song : ${songs}"
                        th:value="${song.songId}"
                        th:text="${song.title + ' — ' + song.artistName}">
                </option>
              </select>
            </label>

            <label class="field">
              <span class="field__label">Rating</span>
              <select class="field__input" name="rating" required>
                <option value="5">★★★★★</option>
                <option value="4" selected>★★★★☆</option>
                <option value="3">★★★☆☆</option>
                <option value="2">★★☆☆☆</option>
                <option value="1">★☆☆☆☆</option>
              </select>
            </label>

            <label class="field">
              <span class="field__label">Review</span>
              <textarea
                class="field__input field__textarea"
                name="comment"
                rows="5"
                placeholder="What did you think?"
                required
              ></textarea>
            </label>

            <div class="actions">
              <button class="btn btn--primary" type="submit">Publish review</button>
              <a class="btn btn--ghost" href="/">Cancel</a>
            </div>
          </form>

        </section>
      </section>
    </main>
  </body>
</html>
