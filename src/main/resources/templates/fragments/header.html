<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

</head>
<body>

<div th:fragment="main-header">
    <header class="header">
        <div class="wrap header__inner">
            <div class="header__row">
                <div class="brand">
                    <div class="brand__mark" aria-hidden="true">J</div>
                    <div class="brand__text">
                        <div class="brand__title">Jukeboxd</div>
                        <div class="brand__tagline">Discover what's spinning now.</div>
                    </div>
                </div>
                <nav class="nav" aria-label="Primary">
                    <form id="song-search-form" class="search-form" action="/api/home/search">
                        <select name="genre" id="genre-filter" class="search-input search-input--select">
                            <option value="">All Genres</option>
                            <option th:each="g : ${genres}" th:value="${g}" th:text="${g}"></option>
                        </select>
                        <input type="search" name="query" class="search-input" placeholder="Search songs..." />
                    </form>
                    <form id="user-search-form" class="search-form">
                        <input type="search" name="query" class="search-input" placeholder="Search users..." />
                    </form>
                    <!-- Only show these links when logged in -->
                    <a th:if="${loggedIn}" class="nav__link" href="/create-review.html">Create a review</a>
                    <a th:if="${loggedIn}" class="nav__link" href="/logout">Log out</a>
                    <!-- Show login link when not logged in -->
                    <a th:unless="${loggedIn}" class="nav__link" href="/login">Log in</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="separator-bottom">
        <nav class="content-center">
            <a href="/">Home</a>
            <!-- Only show Profile link when logged in -->
            <a th:if="${loggedIn}" href="/profile">Profile</a>
            <a href="/listenlist">Listen List</a>
            <a href="/albumview">Album View</a>
            <a href="/songview">Song View</a>
        </nav>
    </div>
</div>

</body>
</html>
