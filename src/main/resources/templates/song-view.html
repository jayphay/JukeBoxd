<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Song • Jukeboxd</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
        .song-hero {
            padding: 60px 0;
            text-align: center;
        }

        .song-title {
            font-family: "Fraunces", serif;
            font-size: 56px;
            margin: 0;
        }

        .song-meta {
            font-size: 20px;
            color: var(--muted2);
            margin-top: 10px;
        }

        .song-meta a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .rating-large {
            font-size: 32px;
            color: var(--accent);
            margin-top: 20px;
            font-weight: 800;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;600&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="bg"></div>
    <div th:replace="~{fragments/header :: main-header}"></div>

    <main class="wrap">
        <header class="song-hero">
            <div id="song-genre" class="pill" style="display:inline-block; margin-bottom:10px;">—</div>
            <h1 id="song-title" class="song-title">Loading...</h1>
            <div class="song-meta">
                by <span id="song-artist">—</span> •
                from the album <a id="album-link" href="#">—</a>
            </div>
            <div id="song-rating"
                style="margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 20px;">
                <a id="write-review" href="#" class="btn"
                    style="margin-top: 30px; display: inline-block;">Loading...</a>
                <div class="rating-large">★ <span id="avg-rating">—</span></div>
            </div>
        </header>

        <section class="grid">
            <section class="card card--wide">
                <div class="card__head">
                    <h2>Recent Reviews</h2>
                </div>
                <div id="reviews-container"></div>
            </section>
        </section>
    </main>
    <script src="/song-view.js" defer></script>
</body>

</html>
