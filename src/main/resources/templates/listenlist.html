<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Listen List | Jukeboxd</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<!-- Pulls in your new header and sub-nav -->
<div th:replace="~{fragments/header :: main-header}"></div>

<main class="wrap">
    <section class="card card--wide">
        <div class="card__head">
            <h2>My Listen List</h2>
            <span class="pill">Saved for later</span>
        </div>

        <!-- Loop through the list from Java -->
        <div class="list">
            <!-- Loop through the listenSongs list sent by WebController -->
            <div class="row" th:each="song : ${listenSongs}" style="display: flex; justify-content: space-between; align-items: center;">
                <a class="row__left" th:href="@{/song?id={id}(id=${song.songId})}" style="color: white; text-decoration: none;">
                    <p class="row__title" th:text="${song.title}">Song Title</p>
                    <p class="row__sub" th:text="${song.artistName}">Artist Name</p>
                </a>

                <!-- The button starts as 'SAVED' because it's already in the list -->
                <button class="listen-toggle is-saved"
                        th:data-id="${song.songId}"
                        data-page="listenlist">SAVED</button>
            </div>
        </div>

        <!-- Load home.js to use the existing click listener -->
        <script src="/home.js" defer></script>

        <!-- Empty State if nothing is found -->
        <div class="empty" th:if="${#lists.isEmpty(listenSongs)}">
            <p class="empty__title">Your list is empty.</p>
            <p class="empty__body">Go explore and add some tracks to your rotation!</p>
        </div>
    </section>
</main>
</body>
</html>
