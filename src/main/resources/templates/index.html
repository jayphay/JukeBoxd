<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jukeboxd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <div th:replace="~{fragments/header :: main-header}"></div>

    <main class="wrap">
      <section class="grid">
        <section class="card" aria-labelledby="popular-albums-title">
          <div class="card__head">
            <h2 id="popular-albums-title">Popular albums</h2>
            <span class="pill">Trending</span>
          </div>
          <ol class="list" id="popular-albums"></ol>
        </section>

        <section class="card" aria-labelledby="popular-singles-title">
          <div class="card__head">
            <h2 id="popular-singles-title">Popular singles</h2>
            <span class="pill pill--alt">Hot</span>
          </div>
          <ol class="list" id="popular-singles"></ol>
        </section>

        <section class="card card--wide" aria-labelledby="popular-artists-title">
          <div class="card__head">
            <h2 id="popular-artists-title">Popular artists</h2>
            <span class="pill">Top</span>
          </div>
          <div class="chips" id="popular-artists"></div>
        </section>

        <section class="card card--wide" aria-labelledby="recent-reviews-title">
          <div class="card__head">
            <h2 id="recent-reviews-title">Recent reviews</h2>
            <div class="card__headRight">
              <a class="btn btn--tiny btn--ghost" href="/create-review">Write one</a>
              <span class="pill pill--alt">New</span>
            </div>
          </div>
          <div class="reviews" id="recent-reviews"></div>
        </section>
      </section>
    </main>

    <script src="/reviews.js" defer></script>
    <script src="/home.js" defer></script>
  </body>
</html>
