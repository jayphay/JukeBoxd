<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Album • Jukeboxd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
        .album-hero {
            display: flex;
            align-items: flex-end;
            gap: 32px;
            padding: 40px 0;
        }

        .album-art {
            width: 200px;
            height: 200px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: grid;
            place-items: center;
            font-size: 64px;
            color: var(--accent);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .album-meta__title {
            font-family: "Fraunces", serif;
            font-weight: 800;
            font-size: 48px;
            margin: 0;
            line-height: 1;
        }

        .album-meta__subtitle {
            font-size: 18px;
            margin-top: 12px;
            color: var(--muted2);
        }

        .album-meta__subtitle b {
            color: var(--text);
        }

        /* Song List Styling */
        .song-list {
            margin-top: 8px;
        }

        .song-row {
            display: grid;
            grid-template-columns: 40px 1fr 120px 80px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
            transition: background 0.2s;
        }

        .song-row__rating {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            text-align: right;
        }

        .song-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .song-row__index {
            color: var(--muted2);
            font-size: 13px;
        }

        .song-row__title {
            font-weight: 600;
        }

        .song-row__genre {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted2);
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="bg"></div>
    <div th:replace="~{fragments/header :: main-header}"></div>

    <main class="wrap">
        <!-- Album Hero Section -->
        <header class="album-hero">
            <div class="album-art">💿</div>
            <div class="album-meta">
                <h1 class="album-meta__title" id="album-title">Loading...</h1>
                <div class="album-meta__subtitle">
                    By <b id="album-artist">—</b> • <span id="album-year">—</span> •
                    <span style="color: var(--accent); font-weight: 600;">
                        ★ <span id="album-rating">—</span>
                    </span>
                </div>
            </div>
        </header>

        <section class="grid">
            <!-- Left Column: Tracklist -->
            <section class="card card--wide">
                <div class="card__head">
                    <h2>Tracklist</h2>
                    <span class="pill" id="track-count">0 Songs</span>
                </div>
                <div class="song-list" id="song-container"></div>
            </section>

            <!-- Bottom Section (or Sidebar): Recent Reviews -->
            <section class="card card--wide" style="margin-top: 24px;">
                <div class="card__head">
                    <h2>Recent Album Reviews</h2>
                </div>
                <div id="reviews-container">
                    <!-- JavaScript will inject reviews here -->
                </div>
            </section>
        </section>
    </main>

    <script src="/album-view.js" defer></script>
</body>

</html>
