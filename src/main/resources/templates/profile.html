<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile • Jukeboxd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .profile-hero {
        display: flex;
        align-items: center;
        gap: 28px;
        padding: 32px 0 24px;
      }
      .profile-avatar {
        flex-shrink: 0;
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(255,211,138,.30), rgba(155,215,255,.22));
        border: 2px solid rgba(255,255,255,.14);
        box-shadow: 0 12px 40px rgba(0,0,0,.45);
        display: grid;
        place-items: center;
        font-family: "Fraunces", serif;
        font-weight: 800;
        font-size: 36px;
        letter-spacing: -.03em;
        color: var(--accent);
      }
      .profile-info__name {
        font-family: "Fraunces", serif;
        font-weight: 800;
        font-size: 30px;
        letter-spacing: -.02em;
        line-height: 1.1;
        margin: 0;
      }
      .profile-info__username {
        margin-top: 4px;
        font-size: 13px;
        color: var(--muted2);
      }
      .profile-info__stats {
        display: flex;
        gap: 20px;
        margin-top: 14px;
      }
      .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      .stat__value {
        font-family: "Fraunces", serif;
        font-weight: 800;
        font-size: 22px;
        line-height: 1;
        color: var(--accent);
      }
      .stat__label {
        font-size: 11px;
        color: var(--muted2);
        letter-spacing: .06em;
        text-transform: uppercase;
      }
      .profile-empty {
        padding: 32px 0;
        text-align: center;
      }
      .profile-empty__title {
        font-family: "Fraunces", serif;
        font-weight: 800;
        font-size: 20px;
        letter-spacing: -.02em;
        margin: 0 0 8px;
      }
      .profile-empty__body {
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>

    <div th:replace="~{fragments/header :: main-header}"></div>

    <main class="wrap">

      <!-- Hero card -->
      <section class="grid grid--single" style="padding-top:0">
        <section class="card card--wide">
          <div class="profile-hero">
            <div class="profile-avatar" id="profile-avatar">?</div>
            <div class="profile-info">
              <div class="profile-info__name" id="profile-name">Loading…</div>
              <div class="profile-info__username" id="profile-username"></div>
              <div class="profile-info__stats">
                <div class="stat">
                  <div class="stat__value" id="stat-reviews">—</div>
                  <div class="stat__label">Reviews</div>
                </div>
                <div class="stat">
                  <div class="stat__value" id="stat-avg">—</div>
                  <div class="stat__label">Avg rating</div>
                </div>
                <div class="stat">
                  <div class="stat__value" id="stat-listen">—</div>
                  <div class="stat__label">Listen list</div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>

      <!-- Reviews -->
      <section class="grid">
        <section class="card card--wide" aria-labelledby="user-reviews-title">
          <div class="card__head">
            <h2 id="user-reviews-title">Reviews</h2>
            <div class="card__headRight">
              <a class="btn btn--tiny btn--ghost" href="/create-review">Write a Review!</a>
              <span class="pill pill--alt" id="review-count-pill">0</span>
            </div>
          </div>
          <div class="reviews" id="user-reviews">
            <div class="profile-empty">
              <div class="profile-empty__title">No reviews yet</div>
              <div class="profile-empty__body">Reviews written by this user will appear here.</div>
            </div>
          </div>
        </section>
      </section>

    </main>

    <!-- Inject the logged-in username so profile.js can fetch the right data -->
    <script th:inline="javascript">
      window.JUKEBOXD_USERNAME = /*[[${username}]]*/ null;
    </script>
    <script src="/reviews.js" defer></script>
    <script src="/profile.js" defer></script>
  </body>
</html>
